<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Centralização</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100dvh;
            background-color: brown;
            font-family: Arial, Helvetica, sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        main {
            height: 300px;
            width: 300px;
            background-color: blueviolet;
            color: yellow;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1 {
            height: 150px;
            width: 150px;
            background-color: #007a7a;
            text-align: center;

            display: flex;
            justify-content: center;
            align-items: center;
        }

    </style>
</head>
<body>
    <main>
        <section>
            <h1>Tela de Login</h1>
        </section>
    </main>
</body>
</html>
